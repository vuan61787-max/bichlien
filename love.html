<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>❤️ Gửi Bích Liên ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    height:100vh;

    background-image: url("background.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;

    overflow:hidden;
    font-family:'Pacifico', cursive;
}

.container{
    text-align:center;
    margin-top:40px;
    color:#ff0066;
}

h1{
    font-size:50px;
}

p{
    font-size:28px;
}

#heartPhotos{
    position:relative;
    width:420px;
    height:420px;
    margin:40px auto;
}

.photo{
    width:80px;
    height:80px;
    border-radius:50%;
    object-fit:cover;
    position:absolute;
    border:4px solid white;
    box-shadow:0 0 15px pink;
}

.heart{
    position:fixed;
    top:-30px;
    color:red;
    animation:fall linear forwards;
}

@keyframes fall{
    from{
        transform:translateY(-30px);
    }
    to{
        transform:translateY(110vh);
    }
}

</style>

</head>

<body>

<div class="container">

<h1>💖 Gửi Bích Liên 💖</h1>

<p>An An thương Liên nhiều lắm ❤️</p>

<div id="heartPhotos">

<img src="anh1.jpg.jpg.jpg" class="photo" style="left:170px;top:0;">
<img src="anh2.jpg.jpg.jpg" class="photo" style="left:100px;top:60px;">
<img src="anh3.jpg.jpg.jpg" class="photo" style="left:240px;top:60px;">
<img src="anh4.jpg.jpg.jpg" class="photo" style="left:50px;top:150px;">
<img src="anh5.jpg.jpg.jpg" class="photo" style="left:290px;top:150px;">
<img src="anh6.jpg.jpg.jpg" class="photo" style="left:120px;top:230px;">
<img src="anh7.jpg.jpg.jpg" class="photo" style="left:220px;top:230px;">
<img src="anh8.jpg.jpg.jpg" class="photo" style="left:170px;top:320px;">

</div>

</div>

<script>

function createHeart(){

let heart=document.createElement("div");

heart.innerHTML="💖";

heart.className="heart";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(15+Math.random()*45)+"px";

heart.style.animationDuration=(2+Math.random()*3)+"s";

document.body.appendChild(heart);

setTimeout(()=>{

heart.remove();

},6000);

}

setInterval(createHeart,60);


</script>

</body>
</html>
